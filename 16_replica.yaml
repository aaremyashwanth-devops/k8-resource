apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: replica-set
spec:
  replicas: 2
  selector: 
    matchLabels: 
      project: roboshop
      environment: dev
      tier: frontend
  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
        tier: frontend
    spec:
      containers:
        - name: nginx
          image: nginx
